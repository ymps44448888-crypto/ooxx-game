<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOXX遊戲</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-box">
        <h1>OOXX小遊戲</h1>
    </div>
    <div id="winO">
        <img src="./O.png" alt="" style="height: auto;">
    </div>
    <div id="winX">
        <img src="./X.png" alt="" style="height: auto;">
    </div>
    <h2 id="status">現在輪到O</h2>
    <div class="context-card board" id="maina">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
        <button id="restart" class="submit-btn">重新開始</button>
    </div>
    <div class="footer-flex" id="mainb">
        <a href="{{ url_for('student_main') }}"><-回首頁</a>
        <span>by.海山高中班聯會製作</span>
    </div>
    <script src="script.js"></script>
</body>
</html>
